{{- if .Values.gateway.httpRoute.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "demoappsite.fullname" . }}
  labels:
    {{- include "demoappsite.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.httpRoute.parentGateway }}
      {{- if .Values.gateway.httpRoute.parentNamespace }}
      namespace: {{ .Values.gateway.httpRoute.parentNamespace }}
      {{- end }}
      {{- if .Values.gateway.httpRoute.parentSection }}
      sectionName: {{ .Values.gateway.httpRoute.parentSection }}
      {{- end }}
  {{- if .Values.gateway.httpRoute.hostnames }}
  hostnames:
    {{- range .Values.gateway.httpRoute.hostnames }}
    - {{ . | quote }}
    {{- end }}
  {{- end }}
  rules:
    - backendRefs:
        - name: {{ include "demoappsite.fullname" . }}
          port: {{ .Values.service.port }}
{{- end }}
