apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "demoappsite.fullname" . }}
  labels:
    {{- include "demoappsite.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "demoappsite.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "demoappsite.labels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: https
              containerPort: {{ .Values.demoapp.port }}
              protocol: TCP
          env:
            - name: DEMO_PORT
              value: {{ .Values.demoapp.port | quote }}
            - name: ROCKET_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "demoappsite.fullname" . }}
                  key: ROCKET_SECRET_KEY
            {{- if .Values.rp.serviceUrl }}
            - name: RP_SERVICE_URL
              value: {{ .Values.rp.serviceUrl | quote }}
            {{- end }}
            {{- if .Values.rp.domain }}
            - name: RP_DOMAIN
              value: {{ .Values.rp.domain | quote }}
            {{- end }}
            {{- if .Values.rp.apiKey }}
            - name: RP_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "demoappsite.fullname" . }}
                  key: RP_API_KEY
            {{- end }}
            {{- if eq .Values.demoapp.allowInvalidCerts "true" }}
            - name: ALLOW_INVALID_CERTS
              value: "true"
            {{- end }}
          livenessProbe:
            tcpSocket:
              port: https
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: https
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
