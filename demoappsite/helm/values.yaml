replicaCount: 1

image:
  repository: containers.catalystsquad.com/public/catalystcommunity/linkkeys-demoappsite
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []

domain: linkidspec.com

demoapp:
  port: 9090
  # Accept invalid TLS certs (development only — self-signed certs)
  allowInvalidCerts: "false"
  # App-level required claims. The IDP lets users decline RP-required claims;
  # this demo rejects the callback if any of these are missing.
  requiredClaims: "display_name,handle"

# The LinkKeys RP service this demo app delegates crypto to, over the LinkKeys
# TCP (CSIL-RPC) transport — the demo holds only an API key, no domain key.
rp:
  # The RP server's TCP endpoint (host:port), e.g. linkkeys-rp:4987
  tcpAddr: ""
  # Comma-separated DNS-published fingerprints pinning the RP server's TLS cert
  # (the RP domain's _linkkeys fp= values).
  fingerprints: ""
  # Bearer token (API key) for authenticating to the RP service
  apiKey: ""
  # The RP's domain name (used in auth requests)
  domain: ""

service:
  type: ClusterIP
  port: 9090

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: linkidspec.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Gateway API (gateway.networking.k8s.io/v1)
gateway:
  httpRoute:
    enabled: false
    parentGateway: ""
    parentNamespace: ""
    parentSection: ""
    hostnames: []

resources: {}
nodeSelector: {}
tolerations: []
affinity: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 2000
  fsGroup: 2000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
