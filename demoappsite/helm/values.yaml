replicaCount: 1

image:
  repository: 10.16.0.1:5000/public/catalystcommunity/linkkeys-demoappsite
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []

domain: linkidspec.com

demoapp:
  port: 9090
  # Accept invalid TLS certs (development only — self-signed certs)
  allowInvalidCerts: "false"

# The LinkKeys RP service this demo app delegates crypto to
rp:
  # URL of the RP service (linkkeys server in RP mode)
  serviceUrl: ""
  # Bearer token for authenticating to the RP service
  apiKey: ""
  # The RP's domain name (used in auth requests)
  domain: ""

service:
  type: ClusterIP
  port: 9090

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: linkidspec.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Gateway API (gateway.networking.k8s.io/v1)
gateway:
  httpRoute:
    enabled: false
    parentGateway: ""
    parentNamespace: ""
    parentSection: ""
    hostnames: []

resources: {}
nodeSelector: {}
tolerations: []
affinity: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 2000
  fsGroup: 2000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
