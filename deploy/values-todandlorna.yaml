image:
  repository: containers.catalystsquad.com/public/catalystcommunity/linkkeys

server:
  domainName: "todandlorna.com"
  apiHostname: "linkkeys.todandlorna.com"
  publicPort: "443"
  disableTls: "true"

# Dual-role: this instance serves IDP traffic for todandlorna.com AND
# acts as an RP for consuming apps (e.g. longhouse). passwordAuth must
# stay true so the IDP login form remains mounted.
rp:
  enabled: true
  apiKeyAuth: true
  passwordAuth: true

database:
  backend: postgres

postgresql:
  enabled: true
  teamId: linkkeys
  database: linkkeys
  user: linkkeys
  instances: 1
  storage:
    size: 1Gi

gateway:
  httpRoute:
    enabled: true
    parentGateway: contour
    parentNamespace: projectcontour
    parentSection: http
    hostnames:
      - linkkeys.todandlorna.com
  # SNI-routed TLS passthrough for the LinkKeys protocol port (4987). The app
  # does its own mutual TLS with the domain keys, so the gateway must NOT
  # terminate: the referenced listener (parentSection) must be `protocol: TLS`
  # with `tls.mode: Passthrough`. Add that listener to the contour Gateway (a
  # section named `linkkeys-tls` on port 4987) and point parentSection at it.
  # Also publish the protocol endpoint in DNS:
  #   _linkkeys_apis.todandlorna.com  TXT  "v=lk1 tcp=linkkeys.todandlorna.com https=linkkeys.todandlorna.com"
  tlsRoute:
    enabled: true
    parentGateway: contour
    parentNamespace: projectcontour
    parentSection: linkkeys-tls
    hostnames:
      - linkkeys.todandlorna.com
