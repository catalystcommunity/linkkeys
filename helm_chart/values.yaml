# LinkKeys server Helm chart values

replicaCount: 1

image:
  repository: containers.catalystsquad.com/public/catalystcommunity/linkkeys
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

# Database configuration
database:
  # postgres or sqlite
  backend: postgres
  # Connection string — for sqlite use a file path like /data/linkkeys.db
  url: "postgresql://linkkeys:linkkeys@linkkeys-postgresql:5432/linkkeys?sslmode=disable"

# Server configuration
server:
  tcpPort: 9000
  httpsPort: 8443
  logLevel: "info"
  # Domain identity used in assertions and DNS
  domainName: ""
  # Passphrase for encrypting/decrypting domain key material
  domainKeyPassphrase: ""
  # Disable TLS on the TCP transport (for development only)
  disableTcpTls: "false"

# Relying party mode — set these to run the same image as an RP server.
# An RP is a LinkKeys server that holds domain keys and signs/decrypts
# on behalf of web apps, but doesn't serve a login UI.
rp:
  # Enable RP endpoints (sign-request, decrypt-token, verify-assertion)
  enabled: false
  # Enable bearer token (API key) authentication on RP endpoints
  apiKeyAuth: true
  # Disable password-based login form (RP servers typically don't need it)
  passwordAuth: false
  # Accept invalid TLS certs when fetching domain keys (development only)
  allowInvalidCerts: "false"

# Optional bundled PostgreSQL (for development)
postgresql:
  enabled: false
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  auth:
    username: linkkeys
    password: linkkeys
    database: linkkeys
  storage:
    size: 1Gi

service:
  type: ClusterIP
  httpPort: 8443
  tcpPort: 9000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: linkkeys.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources: {}

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 2000
  fsGroup: 2000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
