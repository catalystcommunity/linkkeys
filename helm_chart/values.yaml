# LinkKeys server Helm chart values

replicaCount: 1

image:
  repository: containers.catalystsquad.com/public/catalystcommunity/linkkeys
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

# Database configuration
database:
  # postgres or sqlite
  backend: postgres
  # Connection string — for sqlite use a path like /data/linkkeys.db
  url: "postgresql://linkkeys:linkkeys@linkkeys-postgresql:5432/linkkeys?sslmode=disable"

# Server configuration
server:
  tcpPort: 9000
  httpsPort: 8443
  logLevel: "info"
  # Domain identity used in assertions and DNS
  domainName: ""
  # Public-facing port for API URL construction (when behind a gateway/LB).
  # Overrides httpsPort for dns-check output. Set to "443" when TLS is terminated at ingress.
  publicPort: ""
  # Passphrase for encrypting/decrypting domain key material
  domainKeyPassphrase: ""
  # Disable TLS on the TCP transport (for development only)
  disableTcpTls: "false"
  # Disable TLS on the HTTP transport (use when behind TLS-terminating ingress/gateway)
  disableTls: "false"

# Relying party mode — set these to run the same image as an RP server.
# An RP is a LinkKeys server that holds domain keys and signs/decrypts
# on behalf of web apps, but doesn't serve a login UI.
rp:
  # Enable RP endpoints (sign-request, decrypt-token, verify-assertion)
  enabled: false
  # Enable bearer token (API key) authentication on RP endpoints
  apiKeyAuth: true
  # Disable password-based login form (RP servers typically don't need it)
  passwordAuth: false
  # Accept invalid TLS certs when fetching domain keys (development only)
  allowInvalidCerts: "false"

# SQLite persistent storage — enabled automatically when database.backend is sqlite
sqlite:
  persistence:
    # Storage size for SQLite data volume
    size: 1Gi
    # Storage class (leave empty for cluster default)
    storageClassName: ""

# PostgreSQL via Zalando postgres-operator
postgresql:
  enabled: false
  # Team ID for the Zalando operator
  teamId: "linkkeys"
  # Database name and owner user
  database: "linkkeys"
  user: "linkkeys"
  # Postgres version
  version: "17"
  # Number of instances (1 for dev, 2+ for HA)
  instances: 1
  storage:
    size: 1Gi

# Service configuration
service:
  # HTTP service type (ClusterIP, NodePort, LoadBalancer)
  type: ClusterIP
  httpPort: 8443
  # TCP service — can be separate type for direct exposure
  tcp:
    # TCP service type (ClusterIP, NodePort, LoadBalancer)
    type: ClusterIP
    port: 9000
    # NodePort for TCP (only used when type is NodePort)
    nodePort: ""

# Legacy Ingress (networking.k8s.io/v1)
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: linkkeys.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Gateway API (gateway.networking.k8s.io/v1)
gateway:
  # HTTPRoute for HTTP/HTTPS traffic
  httpRoute:
    enabled: false
    # Name of the Gateway resource to attach to
    parentGateway: ""
    # Namespace of the Gateway (leave empty for same namespace)
    parentNamespace: ""
    # Section name on the Gateway (e.g., "https")
    parentSection: ""
    hostnames: []
    #  - linkkeys.example.com
    # Optional path prefixes — routes only matching paths to this service.
    # Useful when sharing a hostname with another service (e.g., RP + demo app).
    # If empty, all paths are routed to this service.
    pathPrefixes: []
    #  - /v1alpha
    #  - /auth
  # TCPRoute for the LinkKeys protocol port
  tcpRoute:
    enabled: false
    parentGateway: ""
    parentNamespace: ""
    parentSection: ""

resources: {}

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 2000
  fsGroup: 2000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
