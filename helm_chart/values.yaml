# LinkKeys server Helm chart values

replicaCount: 1

image:
  repository: containers.catalystsquad.com/public/catalystcommunity/linkkeys
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

# Database configuration
database:
  # postgres or sqlite
  backend: postgres
  # Connection string — for sqlite use a path like /data/linkkeys.db
  url: "postgresql://linkkeys:linkkeys@linkkeys-postgresql:5432/linkkeys?sslmode=disable"

# Server configuration
server:
  tcpPort: 4987
  httpsPort: 8443
  logLevel: "info"
  # Domain identity used in assertions and DNS (e.g., "todandlorna.com")
  domainName: ""
  # API hostname if different from domainName (e.g., "linkkeys.todandlorna.com")
  # Used as the _linkkeys_apis https= host. Defaults to domainName if not set.
  apiHostname: ""
  # TCP protocol hostname advertised in the _linkkeys_apis tcp= value. Defaults
  # to domainName if not set; set to the API host (e.g. "linkkeys.example.com")
  # when the protocol port is reached at the same host as the API.
  tcpHostname: ""
  # Public-facing port for API URL construction (when behind a gateway/LB).
  # Overrides httpsPort for dns-check output. Set to "443" when TLS is terminated at ingress.
  publicPort: ""
  # Passphrase for encrypting/decrypting domain key material
  domainKeyPassphrase: ""
  # Stable secret key for browser session cookies (SEC-11). Leave empty for a
  # single ephemeral instance; set a persistent random value (e.g. `openssl rand
  # -base64 32`) so sessions survive restarts and work across replicas.
  rocketSecretKey: ""
  # TLS on the LinkKeys TCP protocol is mandatory (FP-pinned mTLS) and cannot be
  # disabled — there is intentionally no knob for it. (deploy-08)
  # Disable TLS on the HTTP transport (use when behind TLS-terminating ingress/gateway)
  disableTls: "false"
  # Comma-separated claim types this domain ALWAYS releases at consent (audience *),
  # shown locked (not user-choosable). Seeded on first boot when no release policies
  # exist. e.g. "email,display_name".
  consentForcedAllow: ""
  # Comma-separated claim types this domain NEVER releases (deny wins).
  consentForcedDeny: ""
  # Idempotently upsert per-audience release policy rows on startup. Use for
  # reproducible demo/admin policy. Audience "*" is the global default.
  # disposition must be "forced_allow" or "forced_deny".
  # Example:
  #   releasePolicies:
  #     - audience: "*"
  #       claimType: "over_21"
  #       disposition: "forced_allow"
  #     - audience: "app.example"
  #       claimType: "address"
  #       disposition: "forced_deny"
  releasePolicies: []
  # Idempotently delete specific release policy rows on startup before applying
  # releasePolicies. This is useful when a demo/admin policy changes and an old
  # persisted forced_allow/forced_deny row must be removed.
  # Example:
  #   releasePolicyDeletes:
  #     - audience: "*"
  #       claimType: "email"
  releasePolicyDeletes: []
  # Idempotently seed trusted third-party attestation issuers.
  # Example:
  #   trustedIssuers:
  #     - claimType: "linkidspec_signed"
  #       issuerDomain: "linkidspec.com"
  trustedIssuers: []
  # Comma-separated claim types this domain's RP helper may issue from signed
  # signing requests. Empty disables automated RP attestation issuance.
  rpIssueClaims: ""
  # Issuer-side deny policy for subjects this domain refuses to sign claims for.
  attestationDenySubjectDomains: ""
  attestationDenySubjectTlds: ""
  # Default lifetime for claims this domain issues as a third-party attestor.
  attestedClaimTtlSeconds: "31536000"

# Relying party mode — set these to run the same image as an RP server.
# An RP is a LinkKeys server that holds domain keys and signs/decrypts
# on behalf of web apps, but doesn't serve a login UI.
rp:
  # Enable RP endpoints (sign-request, decrypt-token, verify-assertion)
  enabled: false
  # Enable bearer token (API key) authentication on RP endpoints
  apiKeyAuth: true
  # Disable password-based login form (RP servers typically don't need it)
  passwordAuth: false
  # Accept invalid TLS certs when fetching domain keys (development only)
  allowInvalidCerts: "false"
  # TOML declaring the claims this server requests from an IDP at login (when it
  # acts as a relying party). Rendered to /config/rp-claims.toml + RP_CLAIMS_CONFIG.
  # Example:
  #   claimsConfig: |
  #     [[required]]
  #     claim_type = "email"
  #     datatype = "email"
  #     [[optional]]
  #     claim_type = "handle"
  #     datatype = "text"
  claimsConfig: ""

# SQLite persistent storage — enabled automatically when database.backend is sqlite
sqlite:
  persistence:
    # Storage size for SQLite data volume
    size: 1Gi
    # Storage class (leave empty for cluster default)
    storageClassName: ""

# PostgreSQL via Zalando postgres-operator
postgresql:
  enabled: false
  # Team ID for the Zalando operator
  teamId: "linkkeys"
  # Database name and owner user
  database: "linkkeys"
  user: "linkkeys"
  # Postgres version
  version: "17"
  # Number of instances (1 for dev, 2+ for HA)
  instances: 1
  storage:
    size: 1Gi

# Service configuration
service:
  # HTTP service type (ClusterIP, NodePort, LoadBalancer)
  type: ClusterIP
  httpPort: 8443
  # TCP service — can be separate type for direct exposure
  tcp:
    # TCP service type (ClusterIP, NodePort, LoadBalancer)
    type: ClusterIP
    port: 4987
    # NodePort for TCP (only used when type is NodePort)
    nodePort: ""

# Legacy Ingress (networking.k8s.io/v1)
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: linkkeys.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Gateway API (gateway.networking.k8s.io/v1)
gateway:
  # HTTPRoute for HTTP/HTTPS traffic
  httpRoute:
    enabled: false
    # Name of the Gateway resource to attach to
    parentGateway: ""
    # Namespace of the Gateway (leave empty for same namespace)
    parentNamespace: ""
    # Section name on the Gateway (e.g., "https")
    parentSection: ""
    hostnames: []
    #  - linkkeys.example.com
    # Optional path prefixes — routes only matching paths to this service.
    # Useful when sharing a hostname with another service (e.g., RP + demo app).
    # If empty, all paths are routed to this service.
    pathPrefixes: []
    #  - /v1alpha
    #  - /auth
  # TCPRoute for the LinkKeys protocol port — plain L4 (port-based) routing.
  # Use this when a gateway listener routes a whole port to this service.
  tcpRoute:
    enabled: false
    parentGateway: ""
    parentNamespace: ""
    parentSection: ""
  # TLSRoute for the LinkKeys protocol port — SNI-based routing with TLS
  # PASSTHROUGH. The LinkKeys TCP protocol does its own mutual TLS with the
  # domain keys, so the gateway must NOT terminate TLS: the parent Gateway
  # listener has to be `protocol: TLS` with `tls.mode: Passthrough`. The client
  # sends SNI = the target domain hostname, which is what `hostnames` matches —
  # so several domains can share one gateway listener on the protocol port.
  # Prefer this over tcpRoute when the listener is shared by SNI. Needs the
  # Gateway API experimental channel (which provides TLSRoute) on the cluster.
  tlsRoute:
    enabled: false
    parentGateway: ""
    parentNamespace: ""
    parentSection: ""
    # SNI hostnames routed to this service (the domain's protocol hostname,
    # i.e. the `tcp=` host published in its _linkkeys_apis record).
    hostnames: []
    #  - linkkeys.example.com

resources: {}

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 2000
  fsGroup: 2000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
