apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "linkkeys.fullname" . }}
  labels:
    {{- include "linkkeys.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  {{- if eq .Values.database.backend "sqlite" }}
  # SQLite stores data on a ReadWriteOnce volume. A rolling update can't attach
  # it to the new pod while the old pod still holds it (Multi-Attach), so the
  # rollout deadlocks. Recreate terminates the old pod first, releasing the volume.
  strategy:
    type: Recreate
  {{- end }}
  selector:
    matchLabels:
      {{- include "linkkeys.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "linkkeys.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "linkkeys.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: https
              containerPort: {{ .Values.server.httpsPort }}
              protocol: TCP
            - name: tcp
              containerPort: {{ .Values.server.tcpPort }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "linkkeys.fullname" . }}
            - secretRef:
                name: {{ include "linkkeys.fullname" . }}
          env:
            {{- if .Values.postgresql.enabled }}
            # Construct DATABASE_URL from Zalando operator-created credentials
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresql.user | default "linkkeys" }}.{{ include "linkkeys.fullname" . }}-postgres.credentials.postgresql.acid.zalan.do
                  key: username
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresql.user | default "linkkeys" }}.{{ include "linkkeys.fullname" . }}-postgres.credentials.postgresql.acid.zalan.do
                  key: password
            - name: DATABASE_URL
              value: "postgresql://$(PGUSER):$(PGPASSWORD)@{{ include "linkkeys.fullname" . }}-postgres:5432/{{ .Values.postgresql.database | default "linkkeys" }}?sslmode=require"
            {{- end }}
          {{- if eq .Values.database.backend "sqlite" }}
          volumeMounts:
            - name: data
              mountPath: /data
          {{- end }}
          # Readiness gates Service traffic and goes green as soon as the TCP
          # listener opens (after migrations + backfills complete). Liveness is
          # deliberately lenient so it never restarts the pod during that
          # startup window — only if the process is genuinely wedged for ~2min.
          readinessProbe:
            tcpSocket:
              port: tcp
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: tcp
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 6
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if eq .Values.database.backend "sqlite" }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "linkkeys.fullname" . }}-data
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
