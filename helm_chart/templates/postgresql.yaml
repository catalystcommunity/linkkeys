{{- if .Values.postgresql.enabled }}
apiVersion: acid.zalan.do/v1
kind: postgresql
metadata:
  name: {{ include "linkkeys.fullname" . }}-postgres
  labels:
    {{- include "linkkeys.labels" . | nindent 4 }}
spec:
  teamId: {{ .Values.postgresql.teamId | default "linkkeys" }}
  numberOfInstances: {{ .Values.postgresql.instances | default 1 }}
  postgresql:
    version: {{ .Values.postgresql.version | default "17" | quote }}
  databases:
    {{ .Values.postgresql.database | default "linkkeys" }}: {{ .Values.postgresql.user | default "linkkeys" }}
  users:
    {{ .Values.postgresql.user | default "linkkeys" }}:
      - superuser
      - createdb
  volume:
    size: {{ .Values.postgresql.storage.size | default "1Gi" }}
{{- end }}
