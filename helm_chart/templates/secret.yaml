apiVersion: v1
kind: Secret
metadata:
  name: {{ include "linkkeys.fullname" . }}
  labels:
    {{- include "linkkeys.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if not .Values.postgresql.enabled }}
  DATABASE_URL: {{ .Values.database.url | b64enc | quote }}
  {{- end }}
  {{- if .Values.server.domainKeyPassphrase }}
  DOMAIN_KEY_PASSPHRASE: {{ .Values.server.domainKeyPassphrase | b64enc | quote }}
  {{- end }}
  {{- if .Values.server.rocketSecretKey }}
  # Signs/encrypts browser session cookies. Provision a stable value (SEC-11) so
  # sessions survive restarts and are valid across replicas; otherwise Rocket
  # generates a fresh ephemeral key per process.
  ROCKET_SECRET_KEY: {{ .Values.server.rocketSecretKey | b64enc | quote }}
  {{- end }}
