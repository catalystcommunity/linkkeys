apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "linkkeys.fullname" . }}
  labels:
    {{- include "linkkeys.labels" . | nindent 4 }}
data:
  DATABASE_BACKEND: {{ .Values.database.backend | quote }}
  LOG_LEVEL: {{ .Values.server.logLevel | quote }}
  # The binary's logger reads RUST_LOG (env_logger), not LOG_LEVEL. Surface our
  # own crates at the configured level while keeping dependency noise at warn.
  RUST_LOG: {{ printf "warn,linkkeys=%s,liblinkkeys=%s" .Values.server.logLevel .Values.server.logLevel | quote }}
  TCP_PORT: {{ .Values.server.tcpPort | quote }}
  HTTPS_PORT: {{ .Values.server.httpsPort | quote }}
  {{- if .Values.server.domainName }}
  DOMAIN_NAME: {{ .Values.server.domainName | quote }}
  {{- end }}
  {{- if .Values.server.apiHostname }}
  API_HOSTNAME: {{ .Values.server.apiHostname | quote }}
  {{- end }}
  {{- if .Values.server.tcpHostname }}
  TCP_HOSTNAME: {{ .Values.server.tcpHostname | quote }}
  {{- end }}
  {{- if .Values.server.publicPort }}
  PUBLIC_PORT: {{ .Values.server.publicPort | quote }}
  {{- end }}
  {{- if eq .Values.server.disableTls "true" }}
  DISABLE_TLS: "true"
  {{- end }}
  {{- if .Values.server.consentForcedAllow }}
  # Comma-separated claim types this domain ALWAYS releases (audience *), shown
  # locked (not user-choosable) on the consent screen. Seeded into release_policies
  # on first boot (when no release policies exist yet).
  CONSENT_FORCED_ALLOW: {{ .Values.server.consentForcedAllow | quote }}
  {{- end }}
  {{- if .Values.server.consentForcedDeny }}
  CONSENT_FORCED_DENY: {{ .Values.server.consentForcedDeny | quote }}
  {{- end }}
  {{- if .Values.server.releasePolicies }}
  # Semicolon-separated audience|claim_type|disposition triples. These are
  # upserted on startup so redeploys reproduce intentional release policy.
  CONSENT_RELEASE_POLICIES: {{- $items := list -}}{{- range .Values.server.releasePolicies -}}{{- $items = append $items (printf "%s|%s|%s" .audience .claimType .disposition) -}}{{- end }} {{ join ";" $items | quote }}
  {{- end }}
  {{- if .Values.server.releasePolicyDeletes }}
  # Semicolon-separated audience|claim_type pairs deleted on startup before
  # CONSENT_RELEASE_POLICIES is applied.
  CONSENT_RELEASE_POLICY_DELETES: {{- $items := list -}}{{- range .Values.server.releasePolicyDeletes -}}{{- $items = append $items (printf "%s|%s" .audience .claimType) -}}{{- end }} {{ join ";" $items | quote }}
  {{- end }}
  {{- if .Values.server.trustedIssuers }}
  # Semicolon-separated claim_type|issuer_domain pairs. These are inserted if
  # absent on startup; admin removals should also be reflected in values.
  TRUSTED_ISSUERS: {{- $items := list -}}{{- range .Values.server.trustedIssuers -}}{{- $items = append $items (printf "%s|%s" .claimType .issuerDomain) -}}{{- end }} {{ join ";" $items | quote }}
  {{- end }}
  {{- if .Values.server.rpIssueClaims }}
  RP_ISSUE_CLAIMS: {{ .Values.server.rpIssueClaims | quote }}
  {{- end }}
  {{- if .Values.server.attestationDenySubjectDomains }}
  ATTESTATION_DENY_SUBJECT_DOMAINS: {{ .Values.server.attestationDenySubjectDomains | quote }}
  {{- end }}
  {{- if .Values.server.attestationDenySubjectTlds }}
  ATTESTATION_DENY_SUBJECT_TLDS: {{ .Values.server.attestationDenySubjectTlds | quote }}
  {{- end }}
  {{- if .Values.server.attestedClaimTtlSeconds }}
  ATTESTED_CLAIM_TTL_SECONDS: {{ .Values.server.attestedClaimTtlSeconds | quote }}
  {{- end }}
  {{- if .Values.rp.claimsConfig }}
  # When this server acts as a relying party, the TOML at this path declares the
  # claims it requests at login (rendered from .Values.rp.claimsConfig).
  RP_CLAIMS_CONFIG: "/config/rp-claims.toml"
  {{- end }}
  {{- if .Values.rp.enabled }}
  ENABLE_RP_ENDPOINTS: "true"
  {{- if .Values.rp.apiKeyAuth }}
  ENABLE_API_KEY_AUTH: "true"
  {{- end }}
  {{- if not .Values.rp.passwordAuth }}
  ENABLE_PASSWORD_AUTH: "false"
  {{- end }}
  {{- if eq .Values.rp.allowInvalidCerts "true" }}
  ALLOW_INVALID_CERTS: "true"
  {{- end }}
  {{- end }}
