name: linkkeys-server-build-and-deploy
description: "Build linkkeys server Docker image and push to registries"
triggers:
  events:
    - push
  branches:
    - main
paths:
  include: ["version/VERSION.txt"]
job:
  image: containers.catalystsquad.com/public/reactorcide/runnerbase:dev
  command: "bash ${REACTORCIDE_CODE_DIR:-/job/src}/.reactorcide/jobs/scripts/server-build-and-deploy.sh"
  timeout: 1800
  capabilities:
    - builder
  run_as:
    user: runner
environment:
  REGISTRY_INTERNAL: "containers.catalystsquad.com"
  REGISTRY_INTERNAL_PATH: "public/catalystcommunity/linkkeys"
  REGISTRY_EXTERNAL: "containers.catalystsquad.com"
  REGISTRY_EXTERNAL_PATH: "public/catalystcommunity/linkkeys"
  REGISTRY_USER: "${secret:catalystcommunity/registry:user}"
  REGISTRY_PASSWORD: "${secret:catalystcommunity/registry:password}"
