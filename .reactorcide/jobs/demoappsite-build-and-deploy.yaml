name: linkkeys-demoappsite-build-and-deploy
description: "Build demoappsite Docker image and deploy to Kubernetes via Helm"
triggers:
  events:
    - push
  branches:
    - main
paths:
  include: ["demoappsite/version/VERSION.txt"]
job:
  image: containers.catalystsquad.com/public/reactorcide/runnerbase:dev
  command: "bash /job/src/.reactorcide/jobs/scripts/demoappsite-build-and-deploy.sh"
  timeout: 1800
  capabilities:
    - builder
environment:
  REGISTRY_INTERNAL: "containers.catalystsquad.com"
  REGISTRY_INTERNAL_PATH: "public/catalystcommunity/linkkeys-demoappsite"
  REGISTRY_EXTERNAL: "containers.catalystsquad.com"
  REGISTRY_USER: "${secret:catalystcommunity/registry:user}"
  REGISTRY_PASSWORD: "${secret:catalystcommunity/registry:password}"
  KUBECONFIG_CONTENT: "${secret:catalystcommunity/k8s:kubeconfig}"
  K8S_NAMESPACE: "linkkeys-demoappsite"
  HELM_RELEASE: "linkkeys-demoappsite"
