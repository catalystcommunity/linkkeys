name: linkkeys-server-build-test
description: "Verify the linkkeys server Docker image builds successfully on PR"
triggers:
  events:
    - pull_request_opened
    - pull_request_updated
  branches:
    - main
paths:
  include: ["crates/**", "Cargo.toml", "Cargo.lock", "Dockerfile"]
job:
  image: 10.16.0.1:5000/public/reactorcide/runnerbase:dev
  command: "bash /job/src/.reactorcide/jobs/scripts/server-build-test.sh"
  timeout: 1800
  capabilities:
    - docker
