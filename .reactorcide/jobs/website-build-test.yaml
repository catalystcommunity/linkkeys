name: linkkeys-website-build-test
description: "Verify the website Docker image builds successfully on PR"
triggers:
  events:
    - pull_request_opened
    - pull_request_updated
  branches:
    - main
paths:
  include: ["website/**"]
job:
  image: containers.catalystsquad.com/public/reactorcide/runnerbase:dev
  command: "bash /job/src/.reactorcide/jobs/scripts/website-build-test.sh"
  timeout: 900
  capabilities:
    - builder
