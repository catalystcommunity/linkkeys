name: linkkeys-release
description: "Version bump with semver-tags and create GitHub release on merge to main"
triggers:
  events:
    - pull_request_merged
  branches:
    - main
job:
  image: containers.catalystsquad.com/public/reactorcide/runnerbase:dev
  command: |
    set -e
    sudo apt-get update && sudo apt-get install -y --no-install-recommends \
      libpq-dev libsqlite3-dev pkg-config git wget build-essential

    export HOME=/home/runner
    export PATH="/usr/local/cargo/bin:$HOME/.cargo/bin:$PATH"

    if ! command -v cargo >/dev/null 2>&1; then
      curl --proto =https --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
    fi

    if [ -f "$HOME/.cargo/env" ]; then
      . "$HOME/.cargo/env"
    elif [ -f /usr/local/cargo/env ]; then
      . /usr/local/cargo/env
    fi

    cd "${REACTORCIDE_CODE_DIR:-/job/src}"
    export CARGO_TARGET_DIR="${CARGO_TARGET_DIR:-/tmp/linkkeys-target}"

    # Stand on the REAL main tip before running the release script. The runner
    # prepares the source at the pull_request_merged ref (an off-main merge
    # commit); a version bump made there can never fast-forward main, and
    # semver-tags may miss tags/history. Reset onto origin/main with full history
    # + tags HERE — before invoking release.sh — so the script runs entirely from
    # main and never rewrites its own file mid-run. SKIP_GITHUB local runs skip
    # this and use the working tree as-is.
    if [ "${SKIP_GITHUB:-false}" != "true" ]; then
      git config user.name "Catalyst Community (automation)"
      git config user.email "automation@catalystcommunity.dev"
      git remote set-url origin "https://x-access-token:${GITHUB_PAT}@github.com/${REACTORCIDE_REPO}.git"
      git fetch --tags --prune --force origin "+refs/heads/main:refs/remotes/origin/main"
      git fetch --unshallow origin 2>/dev/null || true
      git checkout -B main origin/main
    fi

    sh .reactorcide/jobs/scripts/release.sh
  timeout: 3600
  priority: 15
  disable_run_local: true
  run_as:
    user: runner
  run_local:
    as_runner: true
environment:
  GITHUB_PAT: "${secret:catalystcommunity/ci:githubpat}"
