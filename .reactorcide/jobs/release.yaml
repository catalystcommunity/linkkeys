name: linkkeys-release
description: "Version bump with semver-tags and create GitHub release on merge to main"
triggers:
  events:
    - pull_request_merged
  branches:
    - main
job:
  image: containers.catalystsquad.com/public/reactorcide/runnerbase:dev
  command: |
    set -e
    sudo apt-get update && sudo apt-get install -y --no-install-recommends \
      libpq-dev libsqlite3-dev pkg-config git wget build-essential

    export HOME=/home/runner
    if ! command -v cargo >/dev/null 2>&1; then
      curl --proto =https --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
    fi
    . "/home/runner/.cargo/env"

    cd "${REACTORCIDE_CODE_DIR:-/job/src}"
    export CARGO_TARGET_DIR="${CARGO_TARGET_DIR:-/tmp/linkkeys-target}"
    sh .reactorcide/jobs/scripts/release.sh
  timeout: 3600
  priority: 15
  disable_run_local: true
  run_as:
    user: runner
  run_local:
    as_runner: true
environment:
  GITHUB_PAT: "${secret:catalystcommunity/ci:githubpat}"
