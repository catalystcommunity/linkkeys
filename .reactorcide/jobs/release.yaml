name: linkkeys-release
description: "Version bump with semver-tags and create GitHub release on merge to main"
triggers:
  events:
    - pull_request_merged
  branches:
    - main
job:
  image: rust:1-bookworm
  command: |
    set -e
    if [ "$(id -u)" = "0" ]; then
      apt-get update && apt-get install -y --no-install-recommends \
        libpq-dev libsqlite3-dev pkg-config git wget
    fi
    if [ "${REACTORCIDE_WORKER_MODE:-remote}" = "local" ]; then
      cd /job/src
    else
      git clone "https://x-access-token:${GITHUB_PAT}@github.com/${REACTORCIDE_REPO}.git" /workspace
      cd /workspace
    fi
    sh .reactorcide/jobs/scripts/release.sh
  timeout: 3600
  priority: 15
  raw_command: true
environment:
  GITHUB_PAT: "${secret:catalystcommunity/ci:githubpat}"
