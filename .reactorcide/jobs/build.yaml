name: linkkeys-build
description: "Build the linkkeys workspace (all features)"
job:
  image: containers.catalystsquad.com/public/reactorcide/runnerbase:dev
  command: |
    set -e
    sudo apt-get update && sudo apt-get install -y --no-install-recommends \
      libpq-dev libsqlite3-dev pkg-config build-essential

    export HOME=/home/runner
    export PATH="/usr/local/cargo/bin:$HOME/.cargo/bin:$PATH"

    if ! command -v cargo >/dev/null 2>&1; then
      curl --proto =https --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
    fi

    if [ -f "$HOME/.cargo/env" ]; then
      . "$HOME/.cargo/env"
    elif [ -f /usr/local/cargo/env ]; then
      . /usr/local/cargo/env
    fi

    cd "${REACTORCIDE_CODE_DIR:-/job/src}"
    export CARGO_TARGET_DIR="${CARGO_TARGET_DIR:-/tmp/linkkeys-target}"

    echo "=== Building workspace (all features) ==="
    cargo build --release 2>&1

    echo "=== Build succeeded ==="
  timeout: 1800
  priority: 10
  run_as:
    user: runner
  run_local:
    as_runner: true
