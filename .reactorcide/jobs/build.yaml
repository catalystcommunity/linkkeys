name: linkkeys-build
description: "Build the linkkeys workspace (all features)"
job:
  image: rust:1-bookworm
  command: |
    set -e
    if [ "$(id -u)" = "0" ]; then
      apt-get update && apt-get install -y --no-install-recommends \
        libpq-dev libsqlite3-dev pkg-config
    fi
    git clone --branch "${REACTORCIDE_PR_REF}" "${REACTORCIDE_SOURCE_URL}" /workspace
    cd /workspace

    echo "=== Building workspace (all features) ==="
    cargo build --release 2>&1

    echo "=== Build succeeded ==="
  timeout: 1800
  priority: 10
  raw_command: true
