name: linkkeys-test-postgres
description: "Run tests against PostgreSQL backend"
job:
  image: 10.16.0.1:5000/public/reactorcide/runnerbase:dev
  command: |
    set -e

    echo "=== Installing dependencies ==="
    sudo apt-get update && sudo apt-get install -y --no-install-recommends \
      libpq-dev libsqlite3-dev pkg-config postgresql postgresql-client build-essential

    echo "=== Installing Rust toolchain ==="
    curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
    . "$HOME/.cargo/env"

    echo "=== Starting PostgreSQL ==="
    PGDATA="/tmp/pgdata"

    # Initialize a user-owned postgres cluster with trust auth
    initdb -D "${PGDATA}" --auth=trust --username=runner
    pg_ctl -D "${PGDATA}" -l /tmp/pg.log -o "-k /tmp -h 127.0.0.1 -p 5432" start
    sleep 2

    # Create test database
    createdb -h /tmp -U runner linkkeys_test

    git clone --branch "${REACTORCIDE_PR_REF}" "${REACTORCIDE_SOURCE_URL}" /workspace
    cd /workspace

    echo "=== Running tests (PostgreSQL backend) ==="
    TEST_DATABASE_BACKEND=postgres \
    TEST_DATABASE_URL="postgres://runner@127.0.0.1/linkkeys_test" \
    cargo test 2>&1

    echo "=== PostgreSQL tests passed ==="
  timeout: 3600
  priority: 10
  raw_command: true
