name: linkkeys-test-sqlite
description: "Run tests against SQLite backend"
job:
  image: containers.catalystsquad.com/public/reactorcide/runnerbase:dev
  command: |
    set -e
    sudo apt-get update && sudo apt-get install -y --no-install-recommends \
      libpq-dev libsqlite3-dev pkg-config build-essential

    export HOME=/home/runner
    if ! command -v cargo >/dev/null 2>&1; then
      curl --proto =https --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
    fi
    . "/home/runner/.cargo/env"

    cd "${REACTORCIDE_CODE_DIR:-/job/src}"
    export CARGO_TARGET_DIR="${CARGO_TARGET_DIR:-/tmp/linkkeys-target}"

    echo "=== Running tests (SQLite backend) ==="
    TEST_DATABASE_BACKEND=sqlite cargo test 2>&1

    echo "=== SQLite tests passed ==="
  timeout: 1800
  priority: 10
  run_as:
    user: runner
  run_local:
    as_runner: true
