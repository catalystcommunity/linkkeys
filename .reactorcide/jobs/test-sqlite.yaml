name: linkkeys-test-sqlite
description: "Run tests against SQLite backend"
job:
  image: rust:1-bookworm
  command: |
    set -e
    apt-get update && apt-get install -y --no-install-recommends \
      libpq-dev libsqlite3-dev pkg-config
    git clone --branch "${REACTORCIDE_PR_REF}" "${REACTORCIDE_SOURCE_URL}" /workspace
    cd /workspace

    echo "=== Running tests (SQLite backend) ==="
    TEST_DATABASE_BACKEND=sqlite cargo test 2>&1

    echo "=== SQLite tests passed ==="
  timeout: 1800
  priority: 10
  raw_command: true
